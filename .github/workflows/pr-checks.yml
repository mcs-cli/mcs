name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install linters
        run: |
          brew install swiftformat swiftlint || true
          brew upgrade swiftformat swiftlint || true

      - name: SwiftFormat
        run: swiftformat --lint --strict .

      - name: SwiftLint
        run: swiftlint --strict --reporter github-actions-logging

  build-and-test:
    name: Build & Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/workspace-state.json
          key: spm-${{ matrix.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ matrix.os }}-

      - name: Swift version
        run: swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Test
        run: swift test

  build-universal:
    name: Universal Binary
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/workspace-state.json
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve packages
        run: swift package resolve

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64
